<!DOCTYPE html>
<html>
<body>
    <h2>CORS Preflight 테스트</h2>

    <button onclick="testSimpleParam()">1. Simple Request (Form)</button>
    <button onclick="testSimpleJson()">2. Preflight Request (JSON)</button>

    <div id="result"></div>

    <script>
        const API_URL = 'http://localhost:8000';

        // 1. Simple Request - Preflight 없음
        async function testSimpleParam() {
            console.log('=== Simple Request 테스트 ===');

            const response = await fetch(`${API_URL}/simpleparam`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `message=${encodeURIComponent('안녕하세요. 1억 가져갈께요. 피싱주의하세요.')}`
            });

            const data = await response.json();
            document.getElementById('result').innerHTML =
                `<pre>${JSON.stringify(data, null, 2)}</pre>`;

            console.log('개발자도구 Network 탭 확인:');
            console.log('→ OPTIONS 요청 없음!');
            console.log('→ POST 요청만 1개!');
        }

        // 2. Preflight 필요 - JSON
        async function testSimpleJson() {
            console.log('=== Preflight Request 테스트 ===');

            const response = await fetch(`${API_URL}/simplejson`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: '안녕하세요. 1억 가져갈께요. 피싱주의하세요.' })
            });

            const data = await response.json();
            document.getElementById('result').innerHTML =
                `<pre>${JSON.stringify(data, null, 2)}</pre>`;

            console.log('개발자도구 Network 탭 확인:');
            console.log('→ OPTIONS 요청 먼저 나감! (Preflight)');
            console.log('→ 그 다음 POST 요청!');
            console.log('→ 총 2개 요청!');
        }
    </script>
</body>
</html>
